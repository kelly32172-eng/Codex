<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>魔法星空抓周派對</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Kiwi+Maru:wght@400;500&family=Quicksand:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <audio
      id="bgMusic"
      loop
      preload="none"
      src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
      data-fallback-src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3,https://cdn.pixabay.com/download/audio/2022/03/24/audio_959db62da6.mp3"
      data-bgm-prompt="Dreamy soft piano instrumental, 80 BPM, felt piano, gentle and airy, warm reverb, minimal melody, lots of space, calm night atmosphere, no drums or very subtle brushed percussion, cinematic ambient texture, relaxing, sleep-friendly, emotional but not sad, 30-minute seamless loop."
    ></audio>

    <main class="container">
      <h1>魔法星空抓周派對：預見寶貝的超能力宇宙！</h1>

      <section id="start-screen" class="card">
        <div class="intro-copy">
          <p>「抓周」是一份跨越千年的祝福，標誌著寶寶踏入新世界的第一步。</p>
          <p>我們將這份古老儀式與現代 MBTI 結合，不僅是觀察寶寶抓取了什麼，更是透過這 18 件富含寓意的道具，解讀寶寶與生俱來的感知力、執行力與性格靈魂。這是一份專為爸爸媽媽準備的「育兒星象圖」，讓我們一起透過魔法道具，看見寶貝眼中的無限宇宙。</p>
        </div>

        <label for="baby-name">寶寶小名
          <input id="baby-name" type="text" placeholder="請輸入寶寶小名" />
        </label>

        <label for="baby-zodiac">星座
          <select id="baby-zodiac">
            <option value="" selected>請選擇星座</option>
            <option value="牡羊">牡羊</option>
            <option value="金牛">金牛</option>
            <option value="雙子">雙子</option>
            <option value="巨蟹">巨蟹</option>
            <option value="獅子">獅子</option>
            <option value="處女">處女</option>
            <option value="天秤">天秤</option>
            <option value="天蠍">天蠍</option>
            <option value="射手">射手</option>
            <option value="摩羯">摩羯</option>
            <option value="水瓶">水瓶</option>
            <option value="雙魚">雙魚</option>
          </select>
        </label>

        <button id="start-btn" type="button">開始測驗</button>
        <div id="bgm-alert" class="bgm-alert hidden" role="status" aria-live="polite">
          <p id="bgm-alert-text">音樂尚未啟用</p>
          <button id="bgm-retry-btn" type="button">點我開啟音樂</button>
        </div>
      </section>

      <section id="quiz-screen" class="card hidden">
        <p id="round-label"></p>
        <h2 id="round-title"></h2>
        <div id="options" class="grid"></div>
        <p id="selected-text">尚未選擇</p>
        <div class="actions">
          <button id="prev-btn" type="button">上一關</button>
          <button id="next-btn" type="button">下一關</button>
        </div>
      </section>

      <section id="result-screen" class="card hidden">
        <article class="report-card">
          <section class="result-top">
            <div class="baby-visual-wrap">
              <p id="report-name" class="report-name"></p>
              <h2 id="report-mbti"></h2>
              <p id="report-title" class="report-title"></p>
              <div id="baby-avatar" class="baby-avatar" aria-label="寶寶人格插畫"></div>
            </div>

            <div class="result-side">
              <section class="seal-block">
                <h3>抓周印記</h3>
                <div id="picked-tags" class="seal-list"></div>
              </section>

              <section class="dimension-block">
                <h3>2x2 四向度解析</h3>
                <div id="dimension-grid" class="dimension-grid"></div>
              </section>
            </div>
          </section>

          <section class="report-grid two-columns">
            <article class="report-block">
              <h3>MBTI 深度分析</h3>
              <p id="analysis-text"></p>
            </article>

            <article class="report-block">
              <h3>星座加成效應</h3>
              <p id="zodiac-text"></p>
            </article>

            <article class="report-block">
              <h3>未來職業參考</h3>
              <ul id="career-text" class="career-list"></ul>
            </article>

            <article class="report-block">
              <h3>爸媽教養建議</h3>
              <p id="parenting-text"></p>
            </article>
          </section>
        </article>

        <button id="restart-btn" type="button">重新測驗</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
