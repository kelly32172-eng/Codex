<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>魔法星空抓周派對</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Kiwi+Maru:wght@400;500&family=Quicksand:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .instructions-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 11, 40, 0.72);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1500;
        padding: 20px;
      }

      .instructions-modal {
        width: min(560px, 100%);
        background: linear-gradient(160deg, #ffffff 0%, #f7f2ff 100%);
        border-radius: 20px;
        padding: 28px 24px;
        box-shadow: 0 24px 60px rgba(18, 10, 42, 0.35);
        text-align: center;
      }

      .instructions-text {
        margin: 0 0 18px;
        color: #2f2a5e;
        line-height: 1.7;
        font-size: 1.05rem;
        font-weight: 600;
      }

      #instructions-confirm-btn {
        border: none;
        border-radius: 999px;
        padding: 12px 26px;
        font-size: 1rem;
        font-weight: 700;
        color: #fff;
        background: linear-gradient(135deg, #8b6dff 0%, #5e4ad5 100%);
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <audio
      id="bgMusic"
      loop
      preload="auto"
      src="./bgm.mp3"
    ></audio>
    <button id="musicToggle" class="music-btn" type="button" aria-label="背景音樂開關">🎵</button>
    <button id="langToggle" class="lang-btn" type="button">EN</button>

    <main class="container">
      <h1 class="page-title" data-i18n="title">魔法星空抓周派對：尋找寶貝的專屬超能力🔮</h1>

      <section id="start-screen" class="card">
        <div class="intro-copy">
          <p class="intro-quote" data-i18n="heroQuote">抓周，不只是延續千年的溫暖祝福，<br />更是寶貝探索世界的第一步。</p>
          <p class="intro-body" data-i18n="heroBody">在這片魔法星空中，我們把古老抓周與 MBTI 靈感結合，透過 18 個充滿寓意的魔法道具，陪你一起解鎖寶貝與生俱來的性格密碼與靈魂天賦。</p>
          <p class="intro-guide" data-i18n="heroGuide">輸入寶寶的小名與星座，開始這趟專屬的星際探索吧。</p>
        </div>
        <div class="start-form">
          <label for="baby-name"><span data-i18n="nameLabel">寶寶小名</span>
            <input id="baby-name" type="text" placeholder="請輸入寶寶小名" data-i18n-placeholder="namePlaceholder" />
          </label>

          <label for="baby-zodiac"><span data-i18n="zodiacLabel">星座</span>
            <select id="baby-zodiac"></select>
          </label>

          <button id="start-btn" type="button" data-i18n="startBtn">開始測驗</button>
        </div>
      </section>

      <section id="quiz-screen" class="card hidden">
        <div class="round-head">
          <p id="round-label" class="round-label"></p>
          <h2 id="round-title"></h2>
          <p id="round-desc" class="round-desc"></p>
        </div>
        <div id="options" class="options"></div>
        <p id="selected-text">尚未選擇</p>
        <div class="actions">
          <button id="prev-btn" type="button" data-i18n="prevBtn">上一關</button>
          <button id="next-btn" type="button" data-i18n="nextBtn">下一關</button>
        </div>
      </section>

      <section id="result-screen" class="card hidden">
        <article class="report-card" id="capture-area">
          <button id="share-btn" class="share-image-button" type="button" aria-label="分享測驗結果">
            <img id="share-btn-image" src="assets/share-btn.png" alt="分享" class="share-image">
          </button>

          <section id="result-top" class="result-top">
            <div class="baby-visual-wrap">
              <div id="report-name" class="result-main-title"></div>
              <div id="report-mbti" class="mbti-badge mbti-purple">分析家寶寶 INTJ</div>
              <div id="baby-avatar" class="result-image-placeholder" aria-label="寶寶人格插畫"></div>
            </div>

            <div class="result-side">
              <section class="seal-block">
                <h3 class="stamp-title">
                  <span data-i18n="resultSealTitle">抓周印記</span>
                </h3>
                <div id="picked-tags" class="seal-list"></div>
              </section>
              <section id="report-sections" class="report-sections">
                <article class="report-section">
                  <h3 data-i18n="resultAnalysisTitle">MBTI 深度分析</h3>
                  <p class="report-text analysis-content"></p>
                </article>
                <article class="report-section">
                  <h3 data-i18n="resultZodiacTitle">星座加成效應</h3>
                  <p class="report-text zodiac-content"></p>
                </article>
                <article class="report-section">
                  <h3 data-i18n="resultCareerTitle">未來職業參考</h3>
                  <ul class="report-list career-list"></ul>
                </article>
                <article class="report-section">
                  <h3 data-i18n="resultParentingTitle">爸媽教養建議</h3>
                  <p class="report-text parenting-content"></p>
                </article>
              </section>
            </div>
          </section>
        </article>

        <button id="download-btn" class="download-btn" type="button" style="background: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; outline: none !important; margin-top: -45px !important;">
          <img id="download-btn-image" src="assets/download-btn.png" style="width: 220px; height: auto;" alt="下載專屬報告">
      </button>

        <button id="restart-btn" type="button" data-i18n="restartBtn">重新測驗</button>
      </section>
    </main>

    <section id="instructions-overlay" class="instructions-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="instructions-text">
      <div class="instructions-modal">
        <p id="instructions-text" class="instructions-text" data-i18n="instructionsText">請讓寶寶選擇喜歡的圖片，以第一個摸到的圖片為主喔！</p>
        <button id="instructions-confirm-btn" type="button" data-i18n="instructionsConfirmBtn">準備好了，出發！</button>
      </div>
    </section>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
