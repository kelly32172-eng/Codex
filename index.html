<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>抓周測驗</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>抓周測驗</h1>

      <section id="start-screen" class="card">
        <h2>開始測驗</h2>
        <label>寶寶姓名
          <input id="baby-name" type="text" placeholder="請輸入寶寶姓名" />
        </label>
        <label>星座
          <input id="baby-zodiac" type="text" placeholder="請輸入星座" />
        </label>
        <button id="start-btn">開始</button>
      </section>

      <section id="quiz-screen" class="card hidden">
        <p id="round-label"></p>
        <h2 id="round-title"></h2>
        <div id="options" class="grid"></div>
        <p id="selected-text">尚未選擇</p>
        <div class="actions">
          <button id="prev-btn">上一關</button>
          <button id="next-btn">下一關</button>
        </div>
      </section>

      <section id="result-screen" class="card hidden">
        <h2>基礎結果</h2>
        <p id="base-info"></p>
        <p id="mbti-result" class="mbti"></p>
        <h3>三個道具</h3>
        <ul id="picked-list"></ul>
        <h3>向度統計</h3>
        <ul id="dimension-list"></ul>

        <div class="paywall">
          <article id="deep-report" class="report"></article>
        </div>

        <button id="restart-btn">重新測驗</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
