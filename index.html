<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>抓周 MBTI 體驗版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="hero__badge">三輪抓周 → 寶寶版 MBTI 報告</p>
        <h1>抓周 MBTI 互動體驗</h1>
        <p class="hero__desc">依照三輪抓周流程，挑出最吸引寶寶的道具，快速看看目前的性格傾向。</p>
      </header>

      <section class="panel" id="selection-panel">
        <div class="profile-form">
          <label class="form-field" for="nickname-input">
            <span>寶寶小名</span>
            <input id="nickname-input" type="text" maxlength="20" placeholder="例如：小米糰、小可樂" />
          </label>
          <label class="form-field" for="zodiac-select">
            <span>星座選擇</span>
            <select id="zodiac-select">
              <option value="">請選擇寶寶星座 ✨</option>
              <option value="aries">♈ 牡羊座</option>
              <option value="taurus">♉ 金牛座</option>
              <option value="gemini">♊ 雙子座</option>
              <option value="cancer">♋ 巨蟹座</option>
              <option value="leo">♌ 獅子座</option>
              <option value="virgo">♍ 處女座</option>
              <option value="libra">♎ 天秤座</option>
              <option value="scorpio">♏ 天蠍座</option>
              <option value="sagittarius">♐ 射手座</option>
              <option value="capricorn">♑ 摩羯座</option>
              <option value="aquarius">♒ 水瓶座</option>
              <option value="pisces">♓ 雙魚座</option>
            </select>
          </label>
        </div>

        <div class="progress-wrap">
          <div class="progress-text" id="progress-text">Round 1 / 3｜興趣（感知世界的方式）</div>
          <div class="progress-bar" role="progressbar" aria-valuemin="1" aria-valuemax="3" aria-valuenow="1">
            <span id="progress-fill"></span>
          </div>
        </div>

        <div class="round-title-wrap">
          <h2 id="round-title">第一輪：選一個最吸引寶寶的道具</h2>
          <p id="round-subtitle">這一輪會看寶寶如何感知世界。</p>
        </div>

        <div id="cards" class="cards"></div>

        <div class="controls">
          <button id="prev-btn" class="btn btn--ghost" type="button">返回上一輪</button>
          <button id="next-btn" class="btn" type="button">下一步</button>
        </div>

        <p id="selected-hint" class="selected-hint">尚未選擇道具</p>
      </section>

      <section id="result-panel" class="panel result hidden" aria-live="polite">
        <h2>分析結果</h2>
        <div class="mbti-type" id="mbti-type">----</div>
        <p id="mbti-title" class="mbti-title"></p>
        <p id="mbti-summary" class="mbti-summary"></p>

        <article class="growth-report" id="growth-report"></article>

        <div class="result-grid">
          <article>
            <h3>本次抓周選擇</h3>
            <ul id="selection-list"></ul>
          </article>
          <article>
            <h3>軸向計分</h3>
            <ul id="axis-list"></ul>
          </article>
        </div>

        <details>
          <summary>查看計分明細</summary>
          <pre id="score-debug"></pre>
        </details>

        <button id="restart-btn" class="btn" type="button">重新測一次</button>
      </section>

      <footer class="disclaimer">聲明：本結果僅作為抓周成長觀察參考，非醫療或心理診斷。</footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
