<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>魔法星空抓周派對</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Kiwi+Maru:wght@400;500&family=Quicksand:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <button id="music-toggle" class="music-toggle" type="button" aria-label="播放魔法音樂" aria-pressed="false">🎵 播放魔法音樂</button>
    <audio
      id="bgm-audio"
      loop
      preload="none"
      src="https://cdn.pixabay.com/download/audio/2022/03/24/audio_959db62da6.mp3"
    ></audio>

    <main class="container">
      <h1>魔法星空抓周派對：預見寶貝的超能力宇宙！</h1>

      <section id="start-screen" class="card">
        <p class="intro-copy">
          「抓周」是寶寶滿週歲時最美好的傳統祝福，用來預測孩子未來的天賦與志向。我們將這份傳統結合現代 MBTI 心理學，透過「興趣、能力、特質」三階段的直覺挑選，帶您解碼寶貝獨一無二的 16 型人格天賦！現在，就跟著直覺幫寶寶挑選 3 件最吸引他的小禮物，獲得專屬的成長報告吧！
        </p>
        <label for="baby-name">寶寶小名
          <input id="baby-name" type="text" placeholder="請輸入寶寶小名" />
        </label>
        <label for="baby-zodiac">星座
          <select id="baby-zodiac">
            <option value="" selected>請選擇星座</option>
            <option value="牡羊">牡羊</option>
            <option value="金牛">金牛</option>
            <option value="雙子">雙子</option>
            <option value="巨蟹">巨蟹</option>
            <option value="獅子">獅子</option>
            <option value="處女">處女</option>
            <option value="天秤">天秤</option>
            <option value="天蠍">天蠍</option>
            <option value="射手">射手</option>
            <option value="摩羯">摩羯</option>
            <option value="水瓶">水瓶</option>
            <option value="雙魚">雙魚</option>
          </select>
        </label>
        <button id="start-btn">開始探索</button>
      </section>

      <section id="quiz-screen" class="card hidden">
        <p id="round-label"></p>
        <h2 id="round-title"></h2>
        <div id="options" class="grid"></div>
        <p id="selected-text">尚未選擇</p>
        <div class="actions">
          <button id="prev-btn">上一關</button>
          <button id="next-btn">下一關</button>
        </div>
      </section>

      <section id="result-screen" class="card hidden">
        <article class="report-card">
          <div class="report-layout">
            <section class="report-left">
              <header class="report-header">
                <h2 id="report-title"></h2>
                <p id="report-subtitle" class="report-subtitle"></p>
              </header>

              <section class="identity-block">
                <p id="mbti-result" class="mbti"></p>
                <p id="mbti-title" class="mbti-title"></p>
                <p id="base-info" class="base-info"></p>
              </section>

              <section class="chosen-items">
                <h3>抓周印記</h3>
                <div id="picked-tags" class="tag-list"></div>
                <ul id="picked-list" class="hidden"></ul>
                <ul id="dimension-list" class="hidden"></ul>
              </section>
            </section>

            <section class="report-right">
              <section class="report-sections">
                <div class="report-block">
                  <h4>✨ 先天天賦</h4>
                  <p id="talent-section"></p>
                </div>
                <div class="report-block">
                  <h4>💖 性格底色</h4>
                  <p id="personality-section"></p>
                </div>
                <div class="report-block">
                  <h4>🌟 給爸爸媽媽的祝福</h4>
                  <p id="blessing-section"></p>
                </div>
              </section>
            </section>
          </div>

          <p id="report-status" class="report-status"></p>
          <article id="deep-report" class="report hidden"></article>
        </article>

        <button id="restart-btn">重新測驗</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
