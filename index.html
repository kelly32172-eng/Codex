<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>抓周測驗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>抓周冒險：小星星天賦大揭密！</h1>

      <section id="start-screen" class="card">
        <h2>冒險起點：一起來闖關！</h2>
        <p class="intro-copy">選好道具、闖完三關，就能解鎖寶寶的天賦線索。準備好看看這顆小星星未來的光芒了嗎？</p>
        <label>寶寶姓名
          <input id="baby-name" type="text" placeholder="請輸入寶寶姓名" />
        </label>
        <label>星座
          <select id="baby-zodiac">
            <option value="" selected>請選擇星座</option>
            <option value="牡羊">牡羊</option>
            <option value="金牛">金牛</option>
            <option value="雙子">雙子</option>
            <option value="巨蟹">巨蟹</option>
            <option value="獅子">獅子</option>
            <option value="處女">處女</option>
            <option value="天秤">天秤</option>
            <option value="天蠍">天蠍</option>
            <option value="射手">射手</option>
            <option value="摩羯">摩羯</option>
            <option value="水瓶">水瓶</option>
            <option value="雙魚">雙魚</option>
          </select>
        </label>
        <button id="start-btn">開始</button>
      </section>

      <section id="quiz-screen" class="card hidden">
        <p id="round-label"></p>
        <h2 id="round-title"></h2>
        <div id="options" class="grid"></div>
        <p id="selected-text">尚未選擇</p>
        <div class="actions">
          <button id="prev-btn">上一關</button>
          <button id="next-btn">下一關</button>
        </div>
      </section>

      <section id="result-screen" class="card hidden">
        <h2>基礎結果</h2>
        <p id="base-info"></p>
        <p id="mbti-result" class="mbti"></p>
        <h3>三個道具</h3>
        <ul id="picked-list"></ul>
        <h3>向度統計</h3>
        <ul id="dimension-list"></ul>

        <div class="paywall">
          <article id="deep-report" class="report"></article>
        </div>

        <button id="restart-btn">重新測驗</button>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
