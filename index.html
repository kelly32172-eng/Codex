<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>魔法星空抓周派對</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Kiwi+Maru:wght@400;500&family=Quicksand:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <audio
      id="bgMusic"
      loop
      preload="auto"
      src="./bgm.mp3"
    ></audio>
    <button id="musicToggle" class="music-btn" type="button" aria-label="背景音樂開關">🎵</button>
    <button id="langToggle" class="lang-btn" type="button">EN</button>

    <main class="container">
      <h1 class="page-title" data-i18n="title">魔法星空抓周派對：尋找寶貝的專屬超能力🔮</h1>

      <section id="start-screen" class="card">
        <div class="intro-copy">
          <p class="intro-quote" data-i18n="heroQuote">抓周，不只是延續千年的溫暖祝福，<br />更是寶貝探索世界的第一步。</p>
          <p class="intro-body" data-i18n="heroBody">在這片魔法星空中，我們把古老抓周與 MBTI 靈感結合，透過 18 個充滿寓意的魔法道具，陪你一起解鎖寶貝與生俱來的性格密碼與靈魂天賦。</p>
          <p class="intro-guide" data-i18n="heroGuide">輸入寶寶的小名與星座，開始這趟專屬的星際探索吧。</p>
        </div>
        <div class="start-form">
          <label for="baby-name"><span data-i18n="nameLabel">寶寶小名</span>
            <input id="baby-name" type="text" placeholder="請輸入寶寶小名" data-i18n-placeholder="namePlaceholder" />
          </label>

          <label for="baby-zodiac"><span data-i18n="zodiacLabel">星座</span>
            <select id="baby-zodiac"></select>
          </label>

          <button id="start-btn" type="button" data-i18n="startBtn">開始測驗</button>
        </div>
      </section>

      <section id="quiz-screen" class="card hidden">
        <div class="round-head">
          <p id="round-label" class="round-label"></p>
          <h2 id="round-title"></h2>
          <p id="round-desc" class="round-desc"></p>
        </div>
        <div id="options" class="options"></div>
        <p id="selected-text">尚未選擇</p>
        <div class="actions">
          <button id="prev-btn" type="button" data-i18n="prevBtn">上一關</button>
          <button id="next-btn" type="button" data-i18n="nextBtn">下一關</button>
        </div>
      </section>

      <section id="result-screen" class="card hidden">
        <article class="report-card">
          <section class="result-top">
            <div class="baby-visual-wrap">
              <p id="report-name" class="report-name report-badge"></p>
              <h2 id="report-mbti"></h2>
              <p id="report-title" class="report-title"></p>
              <div id="baby-avatar" class="baby-avatar" aria-label="寶寶人格插畫"></div>
            </div>

            <div class="result-side">
              <section class="seal-block">
                <h3 data-i18n="resultSealTitle">抓周印記</h3>
                <div id="picked-tags" class="seal-list"></div>
              </section>

              <section class="dimension-block">
                <h3 data-i18n="resultDimensionTitle">2x2 四向度解析</h3>
                <div id="dimension-grid" class="dimension-grid"></div>
              </section>
            </div>
          </section>

          <section class="report-grid two-columns">
            <article class="report-block">
              <h3 data-i18n="resultAnalysisTitle">MBTI 深度分析</h3>
              <p id="analysis-text"></p>
            </article>

            <article class="report-block">
              <h3 data-i18n="resultZodiacTitle">星座加成效應</h3>
              <p id="zodiac-text"></p>
            </article>

            <article class="report-block">
              <h3 data-i18n="resultCareerTitle">未來職業參考</h3>
              <ul id="career-text" class="career-list"></ul>
            </article>

            <article class="report-block">
              <h3 data-i18n="resultParentingTitle">爸媽教養建議</h3>
              <p id="parenting-text"></p>
            </article>
          </section>
        </article>

        <button id="restart-btn" type="button" data-i18n="restartBtn">重新測驗</button>
      </section>
    </main>

    <div class="icon-source-bank" aria-hidden="true">
      <svg viewBox="0 0 36 36">
        <title>book</title>
        <path d="M7.8 9.2h9.6c2.1 0 3.3.8 4 1.7.7-.9 1.9-1.7 4-1.7H28c.9 0 1.6.7 1.6 1.6v15.8c0 .9-.7 1.6-1.6 1.6h-2.6c-2.1 0-3.3.9-4 1.8-.3.4-.8.6-1.2.6s-.9-.2-1.2-.6c-.7-.9-1.9-1.8-4-1.8H7.8c-.9 0-1.6-.7-1.6-1.6V10.8c0-.9.7-1.6 1.6-1.6z" />
      </svg>
      <svg viewBox="0 0 36 36">
        <title>paper-airplane</title>
        <path d="M5.7 17.8l24.7-8.5c.9-.3 1.7.6 1.3 1.4l-8.8 20.1c-.4.9-1.6 1-2.1.2l-3.7-6-6.1-3.7c-.8-.5-.7-1.7.2-2.1l14.4-6.5-15.9 4.1-3.2 1.1c-.4.1-.7 0-.8-.2z" />
      </svg>
      <svg viewBox="0 0 36 36">
        <title>ball</title>
        <path d="M18 8.8c-6.2 0-11.2 5-11.2 11.2s5 11.2 11.2 11.2 11.2-5 11.2-11.2S24.2 8.8 18 8.8zm0 3.2a8 8 0 0 1 6.4 3.2 12.7 12.7 0 0 1-5.3 1.2 12.4 12.4 0 0 1-7-2.1A8 8 0 0 1 18 12zm-7.9 9.1c1.5.8 4.2 1.8 8 1.8 2.8 0 5.5-.6 7.5-1.7a8 8 0 0 1-15.5-.1z" />
      </svg>
      <svg viewBox="0 0 36 36">
        <title>keyboard</title>
        <path d="M7.5 10.5h21c1.1 0 2 .9 2 2v14c0 1.1-.9 2-2 2h-21c-1.1 0-2-.9-2-2v-14c0-1.1.9-2 2-2zM9.8 15.2h16.4v10.6H9.8z" />
        <path d="M12.3 15.2h1.8v7.2h-1.8zm3.8 0h1.8v7.2h-1.8zm3.8 0h1.8v7.2h-1.8zm3.8 0h1.8v7.2h-1.8z" fill="#fff" />
      </svg>
      <svg viewBox="0 0 36 36">
        <title>palette</title>
        <path d="M18.2 8.8c-6.4 0-11.6 4.8-11.6 10.7 0 5.3 4 9.7 9.2 9.7h1.5c1.5 0 2.8-1.2 2.8-2.7 0-1.2-.8-2.1-.8-3.1 0-1.6 1.2-2.8 3.1-2.8h1.9c3 0 5-2.1 5-5C29.2 11.8 24.5 8.8 18.2 8.8z" />
        <circle cx="12.8" cy="16.3" r="1.5" fill="#fff" />
        <circle cx="16.5" cy="13.5" r="1.4" fill="#fff" />
        <circle cx="20.6" cy="13.9" r="1.3" fill="#fff" />
        <circle cx="23.7" cy="16.8" r="1.3" fill="#fff" />
      </svg>
      <svg viewBox="0 0 36 36">
        <title>camera</title>
        <path d="M8.2 12.2h4.1l1.5-2.1c.4-.6 1.1-.9 1.8-.9h4.8c.7 0 1.4.3 1.8.9l1.5 2.1h4.1c1.3 0 2.3 1 2.3 2.3v11c0 1.3-1 2.3-2.3 2.3H8.2c-1.3 0-2.3-1-2.3-2.3v-11c0-1.3 1-2.3 2.3-2.3z" />
        <circle cx="18" cy="20" r="4.4" fill="#fff" />
        <circle cx="18" cy="20" r="2.3" />
        <circle cx="24.9" cy="15.7" r="1.2" fill="#fff" />
      </svg>
    </div>

    <script src="app.js"></script>
  </body>
</html>
